<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darhad Field Lab PRO</title>
    <style>
        :root { --primary: #1a2a6c; --accent: #f2a154; --success: #2ecc71; --error: #e74c3c; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; user-select: none; }
        .app-container { max-width: 500px; margin: auto; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .day-scroller { display: flex; overflow-x: auto; gap: 10px; padding: 15px; scrollbar-width: none; }
        .day-card { min-width: 55px; height: 55px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #e2e8f0; cursor: pointer; transition: 0.3s; }
        .day-card.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.1); }
        .nav-tabs { display: flex; padding: 0 15px 15px; gap: 10px; }
        .tab { flex: 1; padding: 15px; text-align: center; background: #cbd5e1; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; }
        .tab.active { background: var(--primary); color: white; }
        .main-card { flex-grow: 1; background: white; margin: 0 15px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .word-list { overflow-y: auto; height: 500px; }
        .word-item { padding: 15px 0; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
        .cyrillic { font-size: 22px; font-weight: 800; color: var(--primary); }
        .p-word { color: var(--accent); font-size: 12px; font-family: monospace; font-weight: bold; text-transform: uppercase; }
        .english { font-size: 14px; color: #64748b; font-style: italic; }
        .play-btn { background: #f1f5f9; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }
        .option { width: 100%; padding: 18px; margin-bottom: 12px; border-radius: 18px; border: 2px solid #f1f5f9; background: white; font-size: 16px; font-weight: bold; text-align: left; }
        .option.correct { background: var(--success); color: white; }
        .option.wrong { background: var(--error); color: white; }
        .score-box { text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 style="margin:0; font-size: 24px;">🏹 Darhad Field Lab PRO</h1>

    </header>

    <div class="day-scroller" id="dayPicker"></div>

    <div class="main-card" id="main-card">
        <div id="content-area"></div>

// Application Engine
let currentDay = parseInt(localStorage.getItem('darhad_day')) || 1;
let mode = 'learn';
let quizPool = [];
let missedWords = JSON.parse(localStorage.getItem('darhad_missed')) || [];
let score = { correct: 0, total: 0 };

function init() {
    renderDayPicker();
    render();
}

function renderDayPicker() {
    const p = document.getElementById('dayPicker');
    p.innerHTML = '';
    for(let i=1; i<=21; i++) {
        const d = document.createElement('div');
        d.className = `day-card ${i === currentDay ? 'active' : ''}`;
        d.innerText = i;
        d.onclick = () => { currentDay = i; localStorage.setItem('darhad_day', i); switchMode('learn'); };
        p.appendChild(d);
    }
}

function switchMode(m) {
    mode = m;
    document.getElementById('tab-learn').classList.toggle('active', m === 'learn');
    document.getElementById('tab-quiz').classList.toggle('active', m === 'quiz');
    if(m === 'quiz') startQuiz();
    render();
}

function startQuiz() {
    const dayData = syllabus[currentDay]?.w || [];
    quizPool = [...dayData, ...missedWords.slice(0, 5)].sort(() => Math.random() - 0.5);
    score = { correct: 0, total: quizPool.length };
}

function render() {
    const area = document.getElementById('content-area');
    const dayData = syllabus[currentDay] || { t: "Researcher Advanced", w: [] };
    document.getElementById('day-title').innerText = `Day ${currentDay}: ${dayData.t}`;
    
    if(mode === 'learn') {
        area.innerHTML = `<div class="word-list">` + dayData.w.map(w => `
            <div class="word-item">
                <div>
                    <div class="cyrillic">${w.c}</div>
                    <div class="p-word">${w.p}</div>
                    <div class="english">${w.e}</div>
                </div>
                <button class="play-btn" onclick="speak('${w.p}')">▶</button>
            </div>`).join('') + `</div>`;
    } else {
        renderQuizCard();
    }
}

function renderQuizCard() {
    const area = document.getElementById('content-area');
    if(!quizPool.length) {
        area.innerHTML = `<div class="score-box"><h2>Round Complete!</h2><div style="font-size:40px; font-weight:800">${Math.round((score.correct/score.total)*100)}%</div><button class="option" onclick="switchMode('quiz')">Retry Round</button></div>`;
        return;
    }
    const current = quizPool[quizPool.length - 1];
    let all = Object.values(syllabus).flatMap(d => d.w);
    let opts = [current];
    while(opts.length < 4) {
        let r = all[Math.floor(Math.random() * all.length)];
        if(!opts.find(o => o.c === r.c)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    area.innerHTML = `<div class="quiz-container"><div style="color:#94a3b8; font-weight:700">QUESTION:</div><div style="font-size:24px; font-weight:800; margin: 10px 0;">"${current.e}"</div>` +
        opts.map(o => `<button class="option" onclick="check(this, ${o === current})">${o.c} <span style="font-size:10px; opacity:0.5">${o.p}</span></button>`).join('') + `</div>`;
}

function check(btn, isCorrect) {
    const word = quizPool.pop();
    if(isCorrect) { score.correct++; btn.classList.add('correct'); speak(word.p); setTimeout(render, 800); }
    else { 
        btn.classList.add('wrong');
        if(!missedWords.find(w => w.c === word.c)) { missedWords.push(word); localStorage.setItem('darhad_missed', JSON.stringify(missedWords)); }
        setTimeout(render, 500); 
    }
}

function speak(p) {
    window.speechSynthesis.cancel();
    const clean = p.toLowerCase().replace(/[^a-z ]/g, '');
    const m = new SpeechSynthesisUtterance(clean + ".");
    m.rate = 0.7;
    window.speechSynthesis.speak(m);
}

init();
</script>
