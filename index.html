<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darhad Field Lab v2.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ecf0f1; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; margin-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary); font-size: 1.5rem; }
        .word-display { font-size: 2.5rem; margin: 20px 0; color: var(--accent); font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #34495e; }
        #feedback { height: 20px; margin-top: 15px; font-weight: 600; }
        .category-tag { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="category-tag" id="category">Landscape</div>
            <div class="word-display" id="word">Loading...</div>
            <input type="text" id="answer" placeholder="Translation..." autocomplete="off">
            <button onclick="checkAnswer()">Verify</button>
            <div id="feedback"></div>
        </div>
    </div>

    <script>
        const vocab = [
            {mn: "Тул", en: "Taimen", cat: "Wildlife"},
            {mn: "Сарлаг", en: "Yak", cat: "Livestock"},
            {mn: "Бэлчээр", en: "Pasture", cat: "Grassland"},
            {mn: "Тайга", en: "Taiga", cat: "Landscape"},
            {mn: "Даваа", en: "Pass", cat: "Landscape"},
            {mn: "Зэвэг", en: "Lenok", cat: "Wildlife"},
            {mn: "Шимтэй өвс", en: "Nutritious grass", cat: "Grassland"},
            {mn: "Баавгай", en: "Bear", cat: "Wildlife"}
        ];

        let current = 0;

        function updateCard() {
            document.getElementById('word').innerText = vocab[current].mn;
            document.getElementById('category').innerText = vocab[current].cat;
            document.getElementById('answer').value = "";
            document.getElementById('feedback').innerText = "";
        }

        function checkAnswer() {
            const user = document.getElementById('answer').value.trim().toLowerCase();
            const correct = vocab[current].en.toLowerCase();
            const feedback = document.getElementById('feedback');

            if (user === correct) {
                feedback.innerText = "Зөв! (Correct!)";
                feedback.style.color = "green";
                setTimeout(() => {
                    current = (current + 1) % vocab.length;
                    updateCard();
                }, 1200);
            } else {
                feedback.innerText = `Try: ${vocab[current].en}`;
                feedback.style.color = "#e74c3c";
            }
        }

        updateCard();
    </script>
</body>
</html>
